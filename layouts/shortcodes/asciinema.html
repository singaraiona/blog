<div class="asciinema">
    {{ $id := printf "asciicast-%s" (md5 (relURL ( .Get "src" ))) }}
    <div id="{{ $id }}"></div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            AsciinemaPlayer.create('{{ .Get "src" }}', document.getElementById('{{ $id }}'));
        });
    </script>
</div>
